<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:black;
height:100vh;
width:100vw;
overflow:hidden;
}

img{
width:100vw;
height:100vh;
object-fit:cover;
}

</style>

</head>

<body>

<img id="quadro">

<script>
function atualizarImagem(){
    const img = document.getElementById("quadro");
    const timestamp = new Date().getTime();
    img.src = "Quadro.png?t=" + timestamp;
}

// atualiza ao carregar
atualizarImagem();

// atualiza a cada 60 segundos
setInterval(atualizarImagem, 60000);
</script>

</body>

</html>
