<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    background:black;
    height:100vh;
    width:100vw;
    overflow:hidden;
}

.container{
    position:relative;
    width:100vw;
    height:100vh;
}

img{
    position:absolute;
    width:100vw;
    height:100vh;
    top:0;
    left:0;
    transition: opacity 1s ease-in-out;
}

.oculta{
    opacity:0;
}

.visivel{
    opacity:1;
}
</style>

</head>

<body>

<div class="container">
    <img id="img1" class="visivel">
    <img id="img2" class="oculta">
</div>

<script>

function getImagemDoDia() {
    const hoje = new Date().getDay();

    switch(hoje){
        case 1: return "seg.png";
        case 2: return "ter.png";
        case 3: return "qua.png";
        case 4: return "qui.png";
        case 5: return "sex.png";
        case 6: return "sáb.png";
        default: return null;
    }
}

let mostrandoQuadro = true;
let atual = 1;

function trocarImagem(src, fit, tempo) {

    const imgAtual = document.getElementById("img" + atual);
    const proxima = document.getElementById("img" + (atual === 1 ? 2 : 1));

    const timestamp = new Date().getTime();

    const nova = new Image();
    nova.src = src + "?t=" + timestamp;

nova.onload = function() {

    proxima.src = nova.src;
    proxima.style.objectFit = fit;

    proxima.classList.remove("oculta");
    proxima.classList.add("visivel");

    imgAtual.classList.remove("visivel");
    imgAtual.classList.add("oculta");

    atual = (atual === 1 ? 2 : 1);

    // ✅ TEMPO COMEÇA AQUI (depois da troca real)
    // setTimeout(atualizarTela, tempo); removido em 23/03/2026
};

// 🔥 SE DER ERRO (sem internet)
nova.onerror = function() {
    console.log("Sem internet, mantendo imagem atual");

    setTimeout(atualizarTela, tempo);
};

    setTimeout(atualizarTela, tempo);
}

function atualizarTela() {

    const imagemDia = getImagemDoDia();

    if (!imagemDia) {
        trocarImagem("Quadro.png", "cover", 60000);
        return;
    }

    if (mostrandoQuadro) {
        mostrandoQuadro = false;
        trocarImagem("Quadro.png", "cover", 50000);
    } else {
        mostrandoQuadro = true;
        trocarImagem(imagemDia, "contain", 10000);
    }
}

// inicia
atualizarTela();

</script>

</body>

</html>
