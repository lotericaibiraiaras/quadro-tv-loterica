<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    background:black;
    height:100vh;
    width:100vw;
    overflow:hidden;
}

.container{
    position:relative;
    width:100vw;
    height:100vh;
}

img{
    position:absolute;
    width:100vw;
    height:100vh;
    top:0;
    left:0;
    transition: opacity 1s ease-in-out;
}

.oculta{
    opacity:0;
}

.visivel{
    opacity:1;
}
</style>

</head>

<body>

<div class="container">
    <img id="img1" class="visivel">
    <img id="img2" class="oculta">
</div>

<script>

// ==============================
// CONFIG
// ==============================
const TEMPO_QUADRO = 50000; // 50s
const TEMPO_DIA = 10000;    // 10s

// ==============================
// IMAGEM DO DIA
// ==============================
function getImagemDoDia() {
    const hoje = new Date().getDay();

    switch(hoje){
        case 1: return "seg.png";
        case 2: return "ter.png";
        case 3: return "qua.png";
        case 4: return "qui.png";
        case 5: return "sex.png";
        case 6: return "sáb.png";
        case 0: return "seg.png"; // domingo usa seg
    }
}

// ==============================
// CONTROLE
// ==============================
let atual = 1;
let mostrandoQuadro = true;

// ==============================
// TROCA DE IMAGEM (SEM TRAVAR)
// ==============================
function trocarImagem(src, fit) {

    const imgAtual = document.getElementById("img" + atual);
    const proxima = document.getElementById("img" + (atual === 1 ? 2 : 1));

    const timestamp = new Date().getTime();

    // força atualização (cache bust)
    const novaSrc = src + "?t=" + timestamp;

    // troca imediata (não espera internet)
    proxima.src = novaSrc;
    proxima.style.objectFit = fit;

    proxima.classList.remove("oculta");
    proxima.classList.add("visivel");

    imgAtual.classList.remove("visivel");
    imgAtual.classList.add("oculta");

    atual = (atual === 1 ? 2 : 1);
}

// ==============================
// LOOP PRINCIPAL (RELÓGIO FIXO)
// ==============================
function iniciarLoop() {

    function ciclo() {

        const imagemDia = getImagemDoDia();

        if (mostrandoQuadro) {
            trocarImagem("Quadro.png", "cover");
            mostrandoQuadro = false;

            setTimeout(ciclo, TEMPO_QUADRO);

        } else {
            trocarImagem(imagemDia, "contain");
            mostrandoQuadro = true;

            setTimeout(ciclo, TEMPO_DIA);
        }
    }

    ciclo();
}

// inicia
iniciarLoop();

</script>

</body>
</html>
