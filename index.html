<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    background:black;
    height:100vh;
    width:100vw;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

img{
    width:100vw;
    height:100vh;
}
</style>

</head>

<body>

<img id="tela">

<script>

function getImagemDoDia() {
    const hoje = new Date().getDay();

    switch(hoje){
        case 1: return "seg.png";
        case 2: return "ter.png";
        case 3: return "qua.png";
        case 4: return "qui.png";
        case 5: return "sex.png";
        case 6: return "sáb.png";
        default: return null; // domingo
    }
}

let mostrandoQuadro = true;

function atualizarTela() {

    const img = document.getElementById("tela");
    const timestamp = new Date().getTime();

    const imagemDia = getImagemDoDia();

    if (!imagemDia) {
        img.style.objectFit = "cover";
        img.src = "Quadro.png?t=" + timestamp;
        setTimeout(atualizarTela, 60000);
        return;
    }

    if (mostrandoQuadro) {

        img.style.objectFit = "cover"; // 🔥 quadro ocupa tudo
        img.src = "Quadro.png?t=" + timestamp;

        mostrandoQuadro = false;
        setTimeout(atualizarTela, 50000);

    } else {

        img.style.objectFit = "contain"; // 🔥 não distorce
        img.src = imagemDia + "?t=" + timestamp;

        mostrandoQuadro = true;
        setTimeout(atualizarTela, 10000);
    }
}

// inicia
atualizarTela();

</script>

</body>

</html>
